<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PAGE_TITLE}}</title>
  <style>{{BRAND_CSS}}</style>
  <style>

    .claude-code {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--space-2xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-xl);
    }

    .claude-code__title {
      margin: 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 200;
      font-family: var(--font-sans);
      color: var(--brand-dark-teal);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .claude-code__tabs {
      display: flex;
      gap: 0;
      border: var(--glass-border-light);
      border-radius: var(--radius-md);
      padding: 4px;
      background: var(--glass-bg-light);
      backdrop-filter: var(--glass-blur);
    }

    .claude-code__tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--brand-muted-gray);
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .claude-code__tab:hover {
      color: var(--brand-dark-teal);
    }

    .claude-code__tab--active {
      background: var(--brand-cream);
      color: var(--brand-dark-teal);
      box-shadow: var(--shadow-soft);
      border: var(--glass-border-light);
    }

    .claude-code__terminal {
      background: var(--glass-bg-dark);
      backdrop-filter: var(--glass-blur);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: var(--glass-border-dark);
      box-shadow: var(--shadow-card);
    }

    .claude-code__terminal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(3, 44, 45, 0.4);
      border-bottom: var(--glass-border-dark);
    }

    .claude-code__terminal-dots {
      display: flex;
      gap: 6px;
    }

    .claude-code__terminal-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .claude-code__terminal-dots span:nth-child(1) { background: #ff5f57; }
    .claude-code__terminal-dots span:nth-child(2) { background: #febc2e; }
    .claude-code__terminal-dots span:nth-child(3) { background: #28c840; }

    .claude-code__terminal-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--brand-muted-gray);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .claude-code__terminal-body {
      padding: var(--space-lg);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      color: var(--brand-cream);
    }

    .claude-code__terminal-body .cmd { color: var(--brand-orange); font-weight: 500; }
    .claude-code__terminal-body .success { color: var(--brand-teal); }
    .claude-code__terminal-body .muted { color: var(--brand-muted-gray); }

    .claude-code__instructions {
      margin: 0;
      font-size: 15px;
      line-height: 1.55;
      font-family: var(--font-sans);
      font-weight: 300;
      color: var(--brand-dark-teal);
    }

    .claude-code__instructions strong {
      font-weight: 500;
      color: var(--brand-teal);
    }

    .claude-code__command-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--glass-bg-dark);
      border: var(--glass-border-dark);
      color: var(--brand-cream);
      border-radius: var(--radius-md);
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .claude-code__command-text {
      flex: 1;
      overflow-x: auto;
    }

    .claude-code__copy-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: rgba(250, 255, 239, 0.1);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--brand-teal);
      transition: background 0.15s;
    }

    .claude-code__copy-btn:hover {
      background: rgba(250, 255, 239, 0.2);
    }

    .claude-code__copy-btn svg {
      width: 18px;
      height: 18px;
    }

    .claude-code__steps {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .claude-code__step {
      font-size: clamp(14px, 1.45vw, 18px);
      font-weight: 300;
      color: var(--brand-dark-teal);
      line-height: 1.5;
    }

    .claude-code__step::before {
      content: attr(data-step) " ";
      font-weight: 500;
      font-family: var(--font-mono);
      color: var(--brand-orange);
    }

    .claude-code__learn-more {
      font-size: 12px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--brand-teal);
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.15s;
    }

    .claude-code__learn-more:hover {
      opacity: 0.85;
    }

</style>
</head>
<body>
  <main class="claude-code">
    <h1 class="claude-code__title">{{HEADLINE}}</h1>

    <div class="claude-code__tabs">
      <button type="button" class="claude-code__tab" aria-pressed="false">{{TAB_CHAT}}</button>
      <button type="button" class="claude-code__tab" aria-pressed="false">{{TAB_AGENT}}</button>
      <button type="button" class="claude-code__tab claude-code__tab--active" aria-pressed="true">{{TAB_CLAUDE_CODE}}</button>
    </div>

    <div class="claude-code__terminal">
      <div class="claude-code__terminal-header">
        <div class="claude-code__terminal-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="claude-code__terminal-title">{{TERMINAL_TITLE}}</span>
      </div>
      <div class="claude-code__terminal-body">
        <div><span class="cmd">$ {{NPX_COMMAND}}</span></div>
        <div><span class="success">✓ {{CONNECTION_MESSAGE}}</span></div>
        <div><span class="muted">— {{TOOLS_LOADED}}</span></div>
      </div>
    </div>

    <p class="claude-code__instructions">{{INSTRUCTIONS}}</p>

    <div class="claude-code__command-box">
      <span class="claude-code__command-text">$ {{NPX_COMMAND}}</span>
      <button type="button" class="claude-code__copy-btn" aria-label="Copy command" data-copy-cmd="{{NPX_COMMAND}}">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
    </div>

    <ol class="claude-code__steps">
      <li class="claude-code__step" data-step="1">{{STEP_1}}</li>
      <li class="claude-code__step" data-step="2">{{STEP_2}}</li>
      <li class="claude-code__step" data-step="3">{{STEP_3}}</li>
    </ol>

    <a href="{{LEARN_MORE_URL}}" class="claude-code__learn-more" target="_blank" rel="noopener">{{LEARN_MORE_LABEL}} →</a>
  </main>

  <script>
    (function() {
      document.querySelectorAll('.claude-code__copy-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var cmd = this.getAttribute('data-copy-cmd');
          var text = '$ ' + cmd;
          navigator.clipboard.writeText(text).then(function() {
            var orig = btn.innerHTML;
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
            setTimeout(function() { btn.innerHTML = orig; }, 1500);
          });
        });
      });
    })();
  </script>
</body>
</html>
